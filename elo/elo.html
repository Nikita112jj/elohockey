<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ICE CLASH — Online Hockey</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg1:#0f1923;--bg2:#1a2634;--bg3:#223044;--bg4:#2a3a50;
  --t1:#e8edf2;--t2:#8899aa;--t3:#556677;
  --ac:#4a9eff;--ac2:#6ab4ff;--acd:rgba(74,158,255,.15);
  --red:#ef4444;--redd:rgba(239,68,68,.15);
  --grn:#22c55e;--gld:#f59e0b;
  --brd:rgba(255,255,255,.06);--brda:rgba(74,158,255,.3);
  --r:12px;--rs:8px;--rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:var(--bg1);font-family:'Inter',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;color:var(--t1)}
.screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* AUTH */
#authScreen{background:var(--bg1);gap:1em}
.auth-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:2em 1.8em;width:min(380px,90vw);display:flex;flex-direction:column;gap:.8em}
.auth-title{font-size:1.2rem;font-weight:800;text-align:center;display:flex;align-items:center;justify-content:center;gap:.4em}
.auth-tabs{display:flex;gap:0;border-radius:var(--rs);overflow:hidden;border:1px solid var(--brd)}
.auth-tab{flex:1;padding:.55em;text-align:center;font-size:.8rem;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--t2);transition:all .15s}
.auth-tab.active{background:var(--ac);color:#fff}
.auth-label{font-size:.7rem;font-weight:600;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-top:.3em}
.auth-input{width:100%;padding:.6em .85em;background:var(--bg3);border:1.5px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:var(--ac)}
.auth-input::placeholder{color:var(--t3)}
.auth-err{color:var(--red);font-size:.75rem;font-weight:500;min-height:1.2em;text-align:center}

/* MENU */
#menuScreen{background:var(--bg1);gap:0;position:relative}
.menu-bg{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 80%,rgba(74,158,255,.04) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(74,158,255,.03) 0%,transparent 50%)}
.menu-logo{font-size:clamp(2rem,7vw,3.5rem);font-weight:900;color:var(--t1);letter-spacing:-.02em;position:relative;z-index:2;display:flex;align-items:center;gap:.3em}
.menu-logo-icon{width:clamp(2rem,6vw,3rem);height:clamp(2rem,6vw,3rem);background:var(--ac);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:#fff}
.menu-logo span{color:var(--ac)}
.menu-sub{color:var(--t3);font-size:clamp(.7rem,2vw,.85rem);font-weight:500;letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.5em;position:relative;z-index:2}
.menu-profile{position:relative;z-index:2;margin-bottom:1.5em;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:.8em 1.2em;display:flex;align-items:center;gap:.8em;width:min(340px,85vw)}
.menu-profile-av{width:42px;height:42px;border-radius:var(--r);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;border:2px solid var(--ac)}
.menu-profile-av img{width:100%;height:100%;object-fit:cover}
.menu-profile-info{flex:1}
.menu-profile-name{font-weight:700;font-size:.9rem}
.menu-profile-elo{color:var(--gld);font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:.3em}
.menu-btns{display:flex;flex-direction:column;gap:.7em;width:min(340px,85vw);position:relative;z-index:2}
.btn{padding:.8em 1.5em;border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.5em}
.btn-primary{background:var(--ac);color:#fff}
.btn-primary:active{transform:scale(.97)}
.btn-outline{background:transparent;border:1.5px solid var(--brd);color:var(--t1)}
.btn-outline:hover{background:var(--bg3);border-color:var(--brda)}
.btn-ghost{background:var(--bg3);color:var(--t2);border:1px solid var(--brd)}
.btn-danger{background:var(--redd);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-sm{padding:.5em 1em;font-size:.78rem}
.btn-icon-top{position:absolute;top:16px;right:16px;width:42px;height:42px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s}
.btn-icon-top:hover{background:var(--bg4);color:var(--t1)}
.btn-icon-top2{position:absolute;top:16px;left:16px;width:42px;height:42px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;color:var(--t2)}

/* MATCHMAKING */
#matchScreen{background:var(--bg1);gap:1.5em}
.match-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:2.5em 2em;display:flex;flex-direction:column;align-items:center;gap:1.2em;width:min(360px,88vw)}
.match-spinner{width:52px;height:52px;border:3px solid var(--bg3);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.match-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.5em}
.match-status{color:var(--t2);font-size:.8rem;font-weight:500}
.match-timer{color:var(--t1);font-size:1.8rem;font-weight:800}

/* SETTINGS */
#settingsScreen{background:var(--bg1);gap:1em;padding:20px}
.settings-header{display:flex;align-items:center;gap:.5em;margin-bottom:.5em}
.settings-title{font-size:1.2rem;font-weight:700}
.settings-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:1.2em;width:min(400px,90vw)}
.settings-label{color:var(--t2);font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5em}
.settings-input{width:100%;padding:.6em .9em;background:var(--bg3);border:1.5px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-family:'Inter',sans-serif;font-size:.88rem;outline:none}
.settings-input:focus{border-color:var(--ac)}
.settings-input::placeholder{color:var(--t3)}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%}
.avatar-opt{width:100%;aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .15s;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.avatar-opt.selected{border-color:var(--ac);background:var(--acd)}
.avatar-opt img{width:100%;height:100%;object-fit:cover;border-radius:var(--r)}
.avatar-upload-btn{width:100%;aspect-ratio:1;border-radius:var(--r);border:1.5px dashed var(--t3);cursor:pointer;background:transparent;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;color:var(--t3);transition:all .15s}
.avatar-upload-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.avatar-upload-btn span{font-size:.5rem;font-weight:600}
#avatarFileInput{display:none}

/* VS SCREEN */
#vsScreen{background:var(--bg1);gap:0}
.vs-container{display:flex;align-items:center;gap:1.5em;width:min(500px,92vw);justify-content:center}
.vs-player{display:flex;flex-direction:column;align-items:center;gap:.5em;flex:1}
.vs-avatar{width:72px;height:72px;border-radius:var(--rl);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.2rem;overflow:hidden;border:3px solid var(--ac)}
.vs-avatar.enemy{border-color:var(--red)}
.vs-avatar img{width:100%;height:100%;object-fit:cover}
.vs-name{font-weight:700;font-size:.95rem;text-align:center;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vs-elo{color:var(--gld);font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:.3em}
.vs-label{font-size:2.5rem;font-weight:900;color:var(--red);flex-shrink:0}
.vs-info{text-align:center;margin-top:1.5em;color:var(--t2);font-size:.8rem;font-weight:500}

/* GAME */
#gameScreen{background:#000;padding:0}
canvas{display:block;touch-action:none}
.game-ui{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:linear-gradient(180deg,rgba(15,25,35,.94) 0%,rgba(15,25,35,.5) 80%,transparent 100%);pointer-events:none;z-index:5}
.score-box{display:flex;align-items:center;gap:8px}
.score-info{display:flex;flex-direction:column}
.score-name{font-size:.6rem;color:var(--t3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.score-num{font-size:1.6rem;font-weight:900;line-height:1}
.score-num.mine{color:var(--ac)}
.score-num.enemy{color:var(--red)}
.score-dots{display:flex;gap:3px;margin-top:2px}
.score-dot{width:8px;height:8px;border-radius:50%;background:var(--bg3);border:1px solid var(--t3)}
.score-dot.fb{background:var(--ac);border-color:var(--ac)}
.score-dot.fr{background:var(--red);border-color:var(--red)}
.game-timer-box{text-align:center}
.game-timer{font-size:1.1rem;font-weight:800}
.game-period{font-size:.55rem;color:var(--t3);font-weight:600;letter-spacing:.1em}
.game-target{font-size:.55rem;color:var(--gld);font-weight:600}
.game-ping{font-size:.5rem;color:var(--t3);font-weight:500;margin-top:1px}
.game-player-avatar{width:32px;height:32px;border-radius:var(--rs);overflow:hidden;border:2px solid var(--ac);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1rem}
.game-player-avatar.enemy{border-color:var(--red)}
.game-player-avatar img{width:100%;height:100%;object-fit:cover}
.shoot-btn{position:absolute;bottom:20px;right:20px;width:56px;height:56px;background:var(--ac);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;pointer-events:auto;transition:all .12s;box-shadow:0 4px 16px rgba(74,158,255,.35);color:#fff}
.shoot-btn:active{transform:scale(.88)}
#goalOverlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
#goalOverlay.show{opacity:1}
.goal-text{font-size:clamp(2.5rem,9vw,5.5rem);font-weight:900;animation:goalPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes goalPop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.goal-sub{color:rgba(255,255,255,.6);font-size:.9rem;font-weight:500;margin-top:.3em}

/* RESULT */
#resultScreen{background:var(--bg1);gap:1.2em}
.result-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:2em;display:flex;flex-direction:column;align-items:center;gap:.6em;width:min(340px,88vw)}
.result-icon{font-size:3rem;margin-bottom:.2em}
.result-title{font-size:1.5rem;font-weight:800}
.result-score{font-size:2.5rem;font-weight:900}
.result-elo{font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:.4em}
.result-elo.pos{color:var(--grn)}.result-elo.neg{color:var(--red)}
.result-win{color:var(--gld)}.result-loss{color:var(--red)}.result-draw{color:var(--ac)}
.result-btns{display:flex;flex-direction:column;gap:.5em;width:min(280px,80vw);margin-top:.3em}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen" class="screen active">
  <div class="auth-card">
    <div class="auth-title"><i data-lucide="shield" style="width:22px;height:22px;color:var(--ac)"></i> ICE CLASH</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Вход</div>
      <div class="auth-tab" id="tabReg" onclick="switchAuthTab('reg')">Регистрация</div>
    </div>
    <div class="auth-label">Никнейм</div>
    <input type="text" class="auth-input" id="authNick" placeholder="Введи никнейм..." maxlength="16">
    <div class="auth-label">Пароль</div>
    <input type="password" class="auth-input" id="authPass" placeholder="Введи пароль..." maxlength="32">
    <div class="auth-err" id="authErr"></div>
    <button class="btn btn-primary" id="authBtn" onclick="doAuth()"><i data-lucide="log-in" style="width:16px;height:16px"></i> <span id="authBtnText">Войти</span></button>
  </div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <div class="menu-bg"></div>
  <button class="btn-icon-top" onclick="openSettings()"><i data-lucide="settings" style="width:20px;height:20px"></i></button>
  <button class="btn-icon-top2" onclick="doLogout()"><i data-lucide="log-out" style="width:20px;height:20px"></i></button>
  <div class="menu-logo">
    <div class="menu-logo-icon"><i data-lucide="swords" style="width:24px;height:24px"></i></div>
    ICE <span>CLASH</span>
  </div>
  <div class="menu-sub">Online Hockey</div>
  <div class="menu-profile" id="menuProfile">
    <div class="menu-profile-av" id="menuAvatar"></div>
    <div class="menu-profile-info">
      <div class="menu-profile-name" id="menuName">Игрок</div>
      <div class="menu-profile-elo"><i data-lucide="trophy" style="width:14px;height:14px"></i> <span id="menuElo">1000</span> ELO</div>
    </div>
  </div>
  <div class="menu-btns">
    <button class="btn btn-primary" onclick="startMatchmaking()"><i data-lucide="globe" style="width:18px;height:18px"></i> Найти игру</button>
    <button class="btn btn-outline" onclick="startVsBot()"><i data-lucide="bot" style="width:18px;height:18px"></i> Играть с ботом</button>
  </div>
</div>

<!-- MATCHMAKING -->
<div id="matchScreen" class="screen">
  <div class="match-card">
    <div class="match-spinner"></div>
    <div class="match-title"><i data-lucide="search" style="width:18px;height:18px"></i> Поиск игрока</div>
    <div class="match-status" id="matchStatus">Ожидание соперника...</div>
    <div class="match-timer" id="matchTimer">0:00</div>
  </div>
  <button class="btn btn-danger" style="width:min(280px,75vw);margin-top:1.2em" onclick="cancelMatchmaking()"><i data-lucide="x" style="width:16px;height:16px"></i> Отмена</button>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="screen">
  <div class="settings-header"><i data-lucide="settings" style="width:22px;height:22px;color:var(--ac)"></i><div class="settings-title">Настройки</div></div>
  <div class="settings-card">
    <div class="settings-label"><i data-lucide="image" style="width:12px;height:12px"></i> Аватарка</div>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:.8em;width:min(400px,90vw)">
    <button class="btn btn-primary" style="flex:1" onclick="saveSettings()"><i data-lucide="check" style="width:16px;height:16px"></i> Сохранить</button>
    <button class="btn btn-ghost" style="flex:1" onclick="backToMenu()"><i data-lucide="arrow-left" style="width:16px;height:16px"></i> Назад</button>
  </div>
  <input type="file" id="avatarFileInput" accept="image/*" onchange="handleAvatarUpload(event)">
</div>

<!-- VS SCREEN -->
<div id="vsScreen" class="screen">
  <div class="vs-container">
    <div class="vs-player">
      <div class="vs-avatar" id="vsMyAvatar"></div>
      <div class="vs-name" id="vsMyName">Ты</div>
      <div class="vs-elo"><i data-lucide="trophy" style="width:14px;height:14px"></i> <span id="vsMyElo">1000</span></div>
    </div>
    <div class="vs-label">VS</div>
    <div class="vs-player">
      <div class="vs-avatar enemy" id="vsEnemyAvatar"></div>
      <div class="vs-name" id="vsEnemyName">Соперник</div>
      <div class="vs-elo"><i data-lucide="trophy" style="width:14px;height:14px"></i> <span id="vsEnemyElo">1000</span></div>
    </div>
  </div>
  <div class="vs-info" id="vsInfo">Игра до 3 голов</div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>
  <div class="game-ui" id="gameUI">
    <div class="score-box">
      <div class="game-player-avatar" id="myAvatarUI"></div>
      <div class="score-info">
        <div class="score-name" id="myNameUI">Ты</div>
        <div class="score-num mine" id="myScoreUI">0</div>
        <div class="score-dots" id="myDots"></div>
      </div>
    </div>
    <div class="game-timer-box">
      <div class="game-target">До 3 голов</div>
      <div class="game-timer" id="gameTimer">5:00</div>
      <div class="game-ping" id="gamePing"></div>
    </div>
    <div class="score-box" style="flex-direction:row-reverse">
      <div class="game-player-avatar enemy" id="enemyAvatarUI"></div>
      <div class="score-info" style="text-align:right">
        <div class="score-name" id="enemyNameUI">Соперник</div>
        <div class="score-num enemy" id="enemyScoreUI">0</div>
        <div class="score-dots" id="enemyDots" style="justify-content:flex-end"></div>
      </div>
    </div>
  </div>
  <button class="shoot-btn" id="shootBtn" onpointerdown="manualShoot()"><i data-lucide="zap" style="width:24px;height:24px"></i></button>
  <div id="goalOverlay">
    <div class="goal-text" id="goalText">ГОЛ!</div>
    <div class="goal-sub" id="goalSub"></div>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <div class="result-icon" id="resultTrophy"></div>
    <div class="result-title" id="resultTitle">Победа!</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-elo" id="resultElo"></div>
  </div>
  <div class="result-btns">
    <button class="btn btn-primary" onclick="backToMenu()"><i data-lucide="home" style="width:16px;height:16px"></i> В меню</button>
    <button class="btn btn-outline" onclick="startVsBot()"><i data-lucide="bot" style="width:16px;height:16px"></i> Ещё с ботом</button>
  </div>
</div>

<script>
// ============ SUPABASE ============
const SUPA_URL='https://xzggbhhxescghsgrfsdi.supabase.co';
const SUPA_KEY='sb_publishable_5JWXQFr78evpyAixvfkG6A_v0nPXSAW';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const MAX_GOALS=3, GAME_TIME=300;

// ============ USER DATA ============
let userData={name:'',avatar:'🏒',customAvatar:null,elo:1000,uid:null};
let authMode='login';

// ============ AUTH ============
function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tabLogin').className='auth-tab'+(mode==='login'?' active':'');
  document.getElementById('tabReg').className='auth-tab'+(mode==='reg'?' active':'');
  document.getElementById('authBtnText').textContent=mode==='login'?'Войти':'Создать аккаунт';
  document.getElementById('authErr').textContent='';
}

async function doAuth(){
  const nick=document.getElementById('authNick').value.trim();
  const pass=document.getElementById('authPass').value;
  const errEl=document.getElementById('authErr');
  errEl.textContent='';
  if(!nick||nick.length<2){errEl.textContent='Никнейм минимум 2 символа';return}
  if(!pass||pass.length<4){errEl.textContent='Пароль минимум 4 символа';return}

  // Use nick as fake email for supabase auth
  const fakeEmail=nick.toLowerCase().replace(/[^a-z0-9]/g,'')+'@iceclash.game';

  if(authMode==='reg'){
    const{data,error}=await sb.auth.signUp({email:fakeEmail,password:pass});
    if(error){
      if(error.message.includes('already')){errEl.textContent='Этот никнейм уже занят';}
      else errEl.textContent=error.message;
      return;
    }
    // Create profile
    const uid=data.user?.id;
    if(uid){
      await sb.from('profiles').upsert({id:uid,name:nick,avatar:'🏒',elo:1000,custom_avatar:null});
    }
    userData={name:nick,avatar:'🏒',customAvatar:null,elo:1000,uid};
    saveLocal();
    onLoggedIn();
  } else {
    const{data,error}=await sb.auth.signInWithPassword({email:fakeEmail,password:pass});
    if(error){errEl.textContent='Неверный никнейм или пароль';return}
    const uid=data.user?.id;
    // Load profile
    const{data:prof}=await sb.from('profiles').select('*').eq('id',uid).single();
    if(prof){
      userData={name:prof.name||nick,avatar:prof.avatar||'🏒',customAvatar:prof.custom_avatar||null,elo:prof.elo||1000,uid};
    } else {
      userData={name:nick,avatar:'🏒',customAvatar:null,elo:1000,uid};
    }
    saveLocal();
    onLoggedIn();
  }
}

// ============ ELO ============
function calcElo(my,op,result){
  const K=40;
  const E=1/(1+Math.pow(10,(op-my)/400));
  return Math.round(K*(result-E));
}

async function startMatchmaking(){
  cleanupAll();
  myId='p_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();
  matchActive=true;matchSec=0;
  showScreen('matchScreen');
  document.getElementById('matchStatus').textContent='Ожидание соперника...';
  document.getElementById('matchTimer').textContent='0:00';
  lucide.createIcons();

  matchTimerInt=setInterval(()=>{matchSec++;document.getElementById('matchTimer').textContent=`${Math.floor(matchSec/60)}:${(matchSec%60).toString().padStart(2,'0')}`},1000);

  channel=sb.channel('mm_lobby_v3',{config:{broadcast:{self:false}}});
  channel.on('broadcast',{event:'seek'},msg=>{
    if(!matchActive||opponentId)return;
    const d=msg.payload;
    if(d.id!==myId){opponentId=d.id;isHost=true;matchActive=false;initOnline(d)}
  });
  await channel.subscribe();

  matchSearchInt=setInterval(()=>{
    if(!matchActive)return;
    channel.send({type:'broadcast',event:'seek',payload:{id:myId,name:userData.name,avatar:userData.customAvatar||userData.avatar,elo:userData.elo,ts:Date.now()}});
  },1100);

  guestCh=sb.channel('pers_'+myId,{config:{broadcast:{self:false}}});
  guestCh.on('broadcast',{event:'invite'},msg=>{
    if(!matchActive||opponentId)return;
    opponentId=msg.payload.hid;isHost=false;matchActive=false;
    joinOnline(msg.payload);
  });
  await guestCh.subscribe();

  setTimeout(()=>{
    if(matchActive&&channel)channel.send({type:'broadcast',event:'seek',payload:{id:myId,name:userData.name,avatar:userData.customAvatar||userData.avatar,elo:userData.elo,ts:Date.now()}});
  },300);
}

async function initOnline(opData){
  clearInterval(matchSearchInt);clearInterval(matchTimerInt);matchSearchInt=matchTimerInt=null;
  if(channel){try{channel.unsubscribe()}catch(e){}}channel=null;
  if(guestCh){try{guestCh.unsubscribe()}catch(e){}}guestCh=null;

  _enName=opData.name||'Соперник';_enAvatar=opData.avatar||'🏒';
  opEloOnline=opData.elo||1000;
  const roomId='rm_'+myId;

  const inv=sb.channel('pers_'+opponentId);
  await inv.subscribe();
  for(let i=0;i<4;i++) setTimeout(()=>inv.send({type:'broadcast',event:'invite',payload:{hid:myId,name:userData.name,avatar:userData.customAvatar||userData.avatar,elo:userData.elo,room:roomId}}),i*200);
  setTimeout(()=>{try{inv.unsubscribe()}catch(e){}},3000);

  showVsScreen(_enName,_enAvatar,opEloOnline,()=>setupRoom(roomId));
}

async function joinOnline(hd){
  clearInterval(matchSearchInt);clearInterval(matchTimerInt);matchSearchInt=matchTimerInt=null;
  if(channel){try{channel.unsubscribe()}catch(e){}}channel=null;
  if(guestCh){try{guestCh.unsubscribe()}catch(e){}}guestCh=null;

  _enName=hd.name||'Соперник';_enAvatar=hd.avatar||'🏒';
  opEloOnline=hd.elo||1000;

  showVsScreen(_enName,_enAvatar,opEloOnline,()=>setupRoom(hd.room));
}

async function setupRoom(roomId){
  channel=sb.channel(roomId,{config:{broadcast:{self:false}}});

  channel.on('broadcast',{event:'s'},msg=>{
    if(msg.payload.id===myId)return;
    // Opponent sends their position as fraction of their screen
    // We mirror it to place on our screen
    opP.x=(1-msg.payload.x)*GW;
    opP.y=(1-msg.payload.y)*GH;
  });

  channel.on('broadcast',{event:'p'},msg=>{
    if(isHost)return;
    // Host sends puck in host coords, guest mirrors
    puck.x=(1-msg.payload.x)*GW;
    puck.y=(1-msg.payload.y)*GH;
    puck.vx=-msg.payload.vx*GW;
    puck.vy=-msg.payload.vy*GH;
  });

  channel.on('broadcast',{event:'g'},msg=>{
    // Goal event from other player
    // msg.payload.w = 'me' means THEY scored on US
    if(msg.payload.w==='me'){
      scoreOp++;
      document.getElementById('enemyScoreUI').textContent=scoreOp;
      showGoalOv('ГОЛ!','#ef4444',_enName+' забил');
    } else {
      scoreMe++;
      document.getElementById('myScoreUI').textContent=scoreMe;
      showGoalOv('ГОЛ!','#4a9eff','Ты забил!');
    }
    updateDots();
    if(scoreMe>=MAX_GOALS||scoreOp>=MAX_GOALS){setTimeout(()=>endGame(),1600)}
  });

  channel.on('broadcast',{event:'r'},()=>resetPos());
  channel.on('broadcast',{event:'po'},msg=>{if(msg.payload.t===myId)pingMs=Date.now()-msg.payload.s});
  channel.on('broadcast',{event:'pi'},msg=>{if(channel)channel.send({type:'broadcast',event:'po',payload:{t:msg.payload.f,s:msg.payload.s}})});

  await channel.subscribe();

  setGameUI(_enName,_enAvatar);
  beginGame(false);

  pingInt=setInterval(()=>{if(channel&&gameRunning)channel.send({type:'broadcast',event:'pi',payload:{f:myId,t:opponentId,s:Date.now()}})},2500);
}

function updateDots(){
  ['myDots','enemyDots'].forEach((id,idx)=>{
    const el=document.getElementById(id);el.innerHTML='';
    const s=idx===0?scoreMe:scoreOp;
    const c=idx===0?'fb':'fr';

function resizeCanvas(){
  const s=document.getElementById('gameScreen');
  GW=s.clientWidth;GH=s.clientHeight;
  canvas.width=GW;canvas.height=GH;
  const m=Math.min(GW,GH);
  myP.r=m*0.05;opP.r=myP.r;puck.r=m*0.022;
}

function goalW(){return Math.min(GW,GH)*0.3}
function goalD(){return Math.min(GW,GH)*0.055}

function getGoals(){
  const gw=goalW(),gd=goalD(),p=port();
  if(p){
    return{
      top:{x:GW/2-gw/2,y:0,w:gw,h:gd},
      bot:{x:GW/2-gw/2,y:GH-gd,w:gw,h:gd}
    };
  } else {
    return{
      top:{x:0,y:GH/2-gw/2,w:gd,h:gw},
      bot:{x:GW-gd,y:GH/2-gw/2,w:gd,h:gw}
    };
  }
}

// Host = bottom/right. Guest = top/left.
// "My goal" = the one I defend. Host defends bottom/right.
function myGoal(){const g=getGoals();return isHost?g.bot:g.top}
function opGoal(){const g=getGoals();return isHost?g.top:g.bot}

function resetPos(){
  const cx=GW/2,cy=GH/2;
  puck.x=cx;puck.y=cy;puck.vx=0;puck.vy=0;
  const p=port();
  if(p){
    if(isHost){myP.x=cx;myP.y=GH*0.75;opP.x=cx;opP.y=GH*0.25}
    else{myP.x=cx;myP.y=GH*0.25;opP.x=cx;opP.y=GH*0.75}
  } else {
    if(isHost){myP.x=GW*0.75;myP.y=cy;opP.x=GW*0.25;opP.y=cy}
    else{myP.x=GW*0.25;myP.y=cy;opP.x=GW*0.75;opP.y=cy}
  }
  goalCD=false;
}

function tickTimer(){
  if(!gameRunning)return;
  gameSec--;
  document.getElementById('gameTimer').textContent=`${Math.floor(gameSec/60)}:${(gameSec%60).toString().padStart(2,'0')}`;
  if(!isBot&&pingMs>0)document.getElementById('gamePing').textContent=`📡 ${pingMs}ms`;
  if(gameSec<=0)endGame();
}

async function endGame(){
  gameRunning=false;
  [gameTimerInt,pingInt].forEach(i=>{if(i)clearInterval(i)});
  gameTimerInt=pingInt=null;
  if(animF){cancelAnimationFrame(animF);animF=null}
  if(channel){try{channel.unsubscribe()}catch(e){}}channel=null;

  const myE=userData.elo,opE=isBot?botElo:opEloOnline;
  const res=scoreMe>scoreOp?1:scoreMe<scoreOp?0:0.5;
  eloChange=calcElo(myE,opE,res);
  if(isBot)eloChange=Math.round(eloChange*0.4);
  userData.elo=Math.max(0,myE+eloChange);
  await saveProfile();
  showResult();
}

function showResult(){
  const t=document.getElementById('resultTrophy'),ti=document.getElementById('resultTitle'),sc=document.getElementById('resultScore'),el=document.getElementById('resultElo');
  sc.textContent=`${scoreMe} : ${scoreOp}`;

  else if(scoreMe<scoreOp){t.textContent='😔';ti.textContent='Поражение';ti.className='result-title result-loss';sc.className='result-score result-loss'}
  else{t.textContent='🤝';ti.textContent='Ничья';ti.className='result-title result-draw';sc.className='result-score result-draw'}
  el.textContent=(eloChange>=0?'+':'')+eloChange+' ELO';
  el.className='result-elo '+(eloChange>=0?'pos':'neg');
  showScreen('resultScreen');lucide.createIcons();
}

// ============ CONTROLS ============
function setupCtrl(){
  canvas.onpointerdown=canvas.onpointermove=canvas.onpointerup=canvas.onpointercancel=null;
  canvas.addEventListener('pointerdown',pdow,{passive:false});
  canvas.addEventListener('pointermove',pmov,{passive:false});
  canvas.addEventListener('pointerup',pup,{passive:false});
  canvas.addEventListener('pointercancel',pup,{passive:false});
}

function cxy(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}

function pdow(e){
  e.preventDefault();
  const p=cxy(e);
  if(Math.hypot(p.x-myP.x,p.y-myP.y)<myP.r*3){
    dragOn=true;dragPid=e.pointerId;dragOx=p.x-myP.x;dragOy=p.y-myP.y;
    try{canvas.setPointerCapture(e.pointerId)}catch(er){}
  }
}

function pmov(e){
  e.preventDefault();
  if(!dragOn||!gameRunning||e.pointerId!==dragPid)return;
  const p=cxy(e),r=myP.r;
  let nx=p.x-dragOx,ny=p.y-dragOy;
  const pr=port();
  // Zone: my half
  if(pr){
    nx=Math.max(r,Math.min(GW-r,nx));
    if(isHost)ny=Math.max(GH/2+r,Math.min(GH-r,ny));
    else ny=Math.max(r,Math.min(GH/2-r,ny));
  } else {
    ny=Math.max(r,Math.min(GH-r,ny));
    if(isHost)nx=Math.max(GW/2+r,Math.min(GW-r,nx));
    else nx=Math.max(r,Math.min(GW/2-r,nx));
  }
  myP.x=nx;myP.y=ny;
  hitPuck(myP,true);
}

function pup(e){if(e.pointerId===dragPid){dragOn=false;dragPid=null;try{canvas.releasePointerCapture(e.pointerId)}catch(er){}}}

function manualShoot(){
  if(!gameRunning)return;
  const d=Math.hypot(puck.x-myP.x,puck.y-myP.y);
  if(d>myP.r*5)return;

  // Shoot toward OPPONENT's goal (the goal I attack)
  const og=opGoal();
  const gx=og.x+og.w/2+(Math.random()-.5)*og.w*.3;
  const gy=og.y+og.h/2;
  const dx=gx-puck.x,dy=gy-puck.y,dd=Math.hypot(dx,dy)||1;
  const spd=Math.min(GW,GH)*.02;
  puck.vx=dx/dd*spd;puck.vy=dy/dd*spd;
  clampV();
  if(!isBot)sendPuck();
}

function clampV(){
  const max=Math.min(GW,GH)*.028;
  const v=Math.hypot(puck.vx,puck.vy);
  if(v>max){puck.vx=puck.vx/v*max;puck.vy=puck.vy/v*max}
}

// ============ PHYSICS ============
function hitPuck(pl,isMe){
  const dx=puck.x-pl.x,dy=puck.y-pl.y,dist=Math.hypot(dx,dy);
  const minD=pl.r+puck.r;
  if(dist<minD&&dist>0.1){
    const nx=dx/dist,ny=dy/dist;
    // Push puck out
    const overlap=minD-dist;
    puck.x+=nx*overlap;puck.y+=ny*overlap;
    // Transfer velocity
    const spd=Math.min(GW,GH)*.013;
    puck.vx=nx*spd;puck.vy=ny*spd;
    if(!isBot&&isMe)sendPuck();
  }
}

function updatePuck(){
  if(!gameRunning)return;
  puck.x+=puck.vx;puck.y+=puck.vy;
  puck.vx*=.994;puck.vy*=.994;
  if(Math.abs(puck.vx)<.01)puck.vx=0;
  if(Math.abs(puck.vy)<.01)puck.vy=0;

  const goals=getGoals(),pr=port(),bw=14;

  // Check goals
  if(!goalCD){
    if(pr){
      // Top goal: puck goes up into it
      if(puck.y-puck.r<=goals.top.y+goals.top.h&&puck.y<goals.top.h+puck.r&&puck.x>goals.top.x&&puck.x<goals.top.x+goals.top.w){
        // Who defends top? Guest (isHost=false) defends top. So if puck enters top goal:
        if(isHost){onGoal(true)}else{onGoal(false)} // host attacks top
        return;
      }
      // Bottom goal
      if(puck.y+puck.r>=goals.bot.y&&puck.x>goals.bot.x&&puck.x<goals.bot.x+goals.bot.w){
        if(isHost){onGoal(false)}else{onGoal(true)}
        return;
      }
    } else {
      // Left goal
      if(puck.x-puck.r<=goals.top.x+goals.top.w&&puck.x<goals.top.w+puck.r&&puck.y>goals.top.y&&puck.y<goals.top.y+goals.top.h){
        if(isHost){onGoal(true)}else{onGoal(false)}
        return;
      }
      // Right goal
      if(puck.x+puck.r>=goals.bot.x&&puck.y>goals.bot.y&&puck.y<goals.bot.y+goals.bot.h){
        if(isHost){onGoal(false)}else{onGoal(true)}
        return;
      }
    }
  }

  // Wall bounces with goal openings
  if(pr){
    if(puck.x-puck.r<bw){puck.x=bw+puck.r;puck.vx*=-.8}
    if(puck.x+puck.r>GW-bw){puck.x=GW-bw-puck.r;puck.vx*=-.8}
    // Top wall
    if(puck.y-puck.r<bw){
      if(puck.x<goals.top.x||puck.x>goals.top.x+goals.top.w){puck.y=bw+puck.r;puck.vy*=-.8}
    }
    // Bottom wall
    if(puck.y+puck.r>GH-bw){
      if(puck.x<goals.bot.x||puck.x>goals.bot.x+goals.bot.w){puck.y=GH-bw-puck.r;puck.vy*=-.8}
    }
    // Goal posts
    postBounce(goals.top.x,goals.top.y+goals.top.h);
    postBounce(goals.top.x+goals.top.w,goals.top.y+goals.top.h);
    postBounce(goals.bot.x,goals.bot.y);
    postBounce(goals.bot.x+goals.bot.w,goals.bot.y);
  } else {
    if(puck.y-puck.r<bw){puck.y=bw+puck.r;puck.vy*=-.8}
    if(puck.y+puck.r>GH-bw){puck.y=GH-bw-puck.r;puck.vy*=-.8}
    if(puck.x-puck.r<bw){
      if(puck.y<goals.top.y||puck.y>goals.top.y+goals.top.h){puck.x=bw+puck.r;puck.vx*=-.8}
    }
    if(puck.x+puck.r>GW-bw){
      if(puck.y<goals.bot.y||puck.y>goals.bot.y+goals.bot.h){puck.x=GW-bw-puck.r;puck.vx*=-.8}
    }
    postBounce(goals.top.x+goals.top.w,goals.top.y);
    postBounce(goals.top.x+goals.top.w,goals.top.y+goals.top.h);
    postBounce(goals.bot.x,goals.bot.y);
    postBounce(goals.bot.x,goals.bot.y+goals.bot.h);
  }

  // Also collide puck with opponent
  hitPuck(opP,false);
}

function postBounce(px,py){
  const dx=puck.x-px,dy=puck.y-py,d=Math.hypot(dx,dy);
  const pr=puck.r+3;
  if(d<pr&&d>0){
    puck.x=px+dx/d*pr;puck.y=py+dy/d*pr;
    const dot=puck.vx*dx/d+puck.vy*dy/d;
    puck.vx-=1.6*dot*dx/d;puck.vy-=1.6*dot*dy/d;
  }
}

function onGoal(meScored){
  goalCD=true;
  if(meScored){
    scoreMe++;document.getElementById('myScoreUI').textContent=scoreMe;
    showGoalOv('ГОЛ!','#4a9eff','Ты забил!');
    if(!isBot&&channel)channel.send({type:'broadcast',event:'g',payload:{w:'me'}});
  } else {
    scoreOp++;document.getElementById('enemyScoreUI').textContent=scoreOp;
    showGoalOv('ГОЛ!','#ef4444',_enName+' забил');
    if(!isBot&&channel)channel.send({type:'broadcast',event:'g',payload:{w:'op'}});
  }
  updateDots();
  setTimeout(()=>{
    if(scoreMe>=MAX_GOALS||scoreOp>=MAX_GOALS){endGame();return}
    resetPos();
    if(!isBot&&channel)channel.send({type:'broadcast',event:'r'});
  },1600);
}

function showGoalOv(text,color,sub){
  const ov=document.getElementById('goalOverlay'),gt=document.getElementById('goalText'),gs=document.getElementById('goalSub');
  gt.textContent=text;gt.style.color=color;gs.textContent=sub;
  ov.style.background=`radial-gradient(ellipse at center,${color}33 0%,transparent 70%)`;
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),1400);
}

// ============ BOT AI (EASY) ============
function updateBot(){
  if(!isBot||!gameRunning)return;
  const sp=Math.min(GW,GH)*.004*botDiff; // very slow

  botBlinkT--;
  if(botBlinkT<=0){botBlink=1;botBlinkT=150+Math.random()*250;setTimeout(()=>{botBlink=0},160)}

  botShootT--;

  const pr=port();
  const mg=myGoal(); // bot defends the "opponent's" goal from our perspective = actually the goal in the opponent's zone
  // Bot defends the goal opposite to ours. Since isHost=true and we're host, bot is top/left
  // Bot's goal to defend = top (portrait) or left (landscape) = getGoals().top
  const botGoalToDefend=getGoals().top; // since isHost=true always for bot
  const bgcx=botGoalToDefend.x+botGoalToDefend.w/2;
  const bgcy=botGoalToDefend.y+botGoalToDefend.h/2;

  const pDist=Math.hypot(puck.x-opP.x,puck.y-opP.y);
  const reactD=Math.min(GW,GH)*(0.2+botDiff*0.15);

  let tx,ty;
  // Is puck coming toward bot's goal?
  const puckToBotGoal=Math.hypot(puck.x-bgcx,puck.y-bgcy);
  const approaching=pr?(puck.vy<-0.5):(puck.vx<-0.5);

  if(pDist<reactD||(approaching&&puckToBotGoal<Math.min(GW,GH)*0.45)){
    // Chase with mild prediction
    tx=puck.x+puck.vx*botDiff*5;
    ty=puck.y+puck.vy*botDiff*5;
  } else {
    // Stay near own goal in defensive position
    if(pr){tx=bgcx+(puck.x-bgcx)*0.2;ty=GH*0.22}
    else{tx=GW*0.22;ty=bgcy+(puck.y-bgcy)*0.2}
  }

  const dx=tx-opP.x,dy=ty-opP.y,dist=Math.hypot(dx,dy)||1;
  const moveSpd=Math.min(sp*1.5,dist*0.08);

  let nx=opP.x+(dx/dist)*moveSpd;
  let ny=opP.y+(dy/dist)*moveSpd;

  // Bot zone: top half (portrait) or left half (landscape) since isHost=true
  const r=opP.r;
  if(pr){nx=Math.max(r,Math.min(GW-r,nx));ny=Math.max(r,Math.min(GH/2-r,ny))}
  else{ny=Math.max(r,Math.min(GH-r,ny));nx=Math.max(r,Math.min(GW/2-r,nx))}

  opP.x=nx;opP.y=ny;
  hitPuck(opP,false);

  // Shoot occasionally
  if(botShootT<=0&&pDist<Math.min(GW,GH)*0.18){
    const tgt=getGoals().bot; // bot shoots at our goal (bottom/right)
    const gx=tgt.x+tgt.w/2+(Math.random()-.5)*tgt.w*.4;
    const gy=tgt.y+tgt.h/2;
    const sdx=gx-puck.x,sdy=gy-puck.y,sd=Math.hypot(sdx,sdy)||1;
    const ss=Math.min(GW,GH)*.01*(0.6+botDiff*0.5);
    puck.vx=sdx/sd*ss;puck.vy=sdy/sd*ss;
    botShootT=Math.round(100+Math.random()*80/botDiff);
  }
}

// ============ ONLINE SYNC ============
function sendState(){
  if(!channel||isBot)return;
  const now=Date.now();if(now-lastSend<40)return;lastSend=now;
  channel.send({type:'broadcast',event:'s',payload:{x:myP.x/GW,y:myP.y/GH,id:myId}});
}

function sendPuck(){
  if(!channel||isBot||!isHost)return;
  channel.send({type:'broadcast',event:'p',payload:{x:puck.x/GW,y:puck.y/GH,vx:puck.vx/GW,vy:puck.vy/GH}});
}

// ============ GAME LOOP ============
function gameLoop(){
  if(!gameRunning)return;
  update();draw();sendState();
  if(isHost&&!isBot){
    // Send puck periodically
    const n=Date.now();
    if(n-lastSend>100)sendPuck();
  }
  animF=requestAnimationFrame(gameLoop);
}

function update(){
  if(isBot)updateBot();
  if(isHost||isBot)updatePuck();
  else{puck.x+=puck.vx;puck.y+=puck.vy;puck.vx*=.994;puck.vy*=.994}
  hitPuck(myP,true);
}

// ============ DRAWING ============
function draw(){
  ctx.clearRect(0,0,GW,GH);
  drawRink();drawGoals();drawCenter();drawPuckD();
  drawPlayerD(opP,false);drawPlayerD(myP,true);
  if(!dragOn)drawPulse();
}

function drawRink(){
  const g=ctx.createLinearGradient(0,0,GW,GH);
  g.addColorStop(0,'#c8dff0');g.addColorStop(.5,'#daeaf5');g.addColorStop(1,'#c4dbec');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);

  ctx.strokeStyle='rgba(180,210,235,.3)';ctx.lineWidth=.5;
  for(let i=0;i<Math.max(GW,GH);i+=28){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,GH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(GW,i);ctx.stroke();
  }

  const bw=14;
  ctx.fillStyle='#3a5a75';
  ctx.fillRect(0,0,GW,bw);ctx.fillRect(0,GH-bw,GW,bw);
  ctx.fillRect(0,0,bw,GH);ctx.fillRect(GW-bw,0,bw,GH);
  ctx.strokeStyle='#5580a0';ctx.lineWidth=2;ctx.strokeRect(bw,bw,GW-bw*2,GH-bw*2);

  const rad=Math.min(GW,GH)*.08;
  ctx.strokeStyle='rgba(180,70,70,.18)';ctx.lineWidth=1.5;
  [[.25,.25],[.75,.25],[.25,.75],[.75,.75]].forEach(([fx,fy])=>{
    ctx.beginPath();ctx.arc(GW*fx,GH*fy,rad,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(180,70,70,.2)';ctx.beginPath();ctx.arc(GW*fx,GH*fy,3,0,Math.PI*2);ctx.fill();
  });
}

function drawGoals(){
  const goals=getGoals(),pr=port();
  [goals.top,goals.bot].forEach((g,idx)=>{
    ctx.save();
    // Net background
    ctx.fillStyle='rgba(255,255,255,.45)';
    ctx.fillRect(g.x,g.y,g.w,g.h);

    // Net lines
    ctx.strokeStyle='rgba(100,100,100,.25)';ctx.lineWidth=.7;
    const st=7;
    for(let x=g.x;x<g.x+g.w;x+=st){ctx.beginPath();ctx.moveTo(x,g.y);ctx.lineTo(x,g.y+g.h);ctx.stroke()}
    for(let y=g.y;y<g.y+g.h;y+=st){ctx.beginPath();ctx.moveTo(g.x,y);ctx.lineTo(g.x+g.w,y);ctx.stroke()}

    // Frame posts
    ctx.strokeStyle='#cc3344';ctx.lineWidth=4;ctx.lineCap='round';
    if(pr){
      const iy=idx===0?g.y+g.h:g.y;
      ctx.beginPath();ctx.moveTo(g.x,iy);ctx.lineTo(g.x+g.w,iy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(g.x,iy);ctx.lineTo(g.x,idx===0?g.y:g.y+g.h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(g.x+g.w,iy);ctx.lineTo(g.x+g.w,idx===0?g.y:g.y+g.h);ctx.stroke();
      ctx.fillStyle='#cc3344';
      ctx.beginPath();ctx.arc(g.x,iy,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(g.x+g.w,iy,4,0,Math.PI*2);ctx.fill();
    } else {
      const ix=idx===0?g.x+g.w:g.x;
      ctx.beginPath();ctx.moveTo(ix,g.y);ctx.lineTo(ix,g.y+g.h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ix,g.y);ctx.lineTo(idx===0?g.x:g.x+g.w,g.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ix,g.y+g.h);ctx.lineTo(idx===0?g.x:g.x+g.w,g.y+g.h);ctx.stroke();
      ctx.fillStyle='#cc3344';
      ctx.beginPath();ctx.arc(ix,g.y,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ix,g.y+g.h,4,0,Math.PI*2);ctx.fill();
    }

    // Crease
    ctx.strokeStyle='rgba(60,120,200,.25)';ctx.lineWidth=1.5;
    const cr=g.w*.3||g.h*.3;
    if(pr){
      const cy2=idx===0?g.y+g.h:g.y;
      ctx.beginPath();ctx.arc(g.x+g.w/2,cy2,cr,idx===0?0:Math.PI,idx===0?Math.PI:0);ctx.stroke();
    } else {
      const cx2=idx===0?g.x+g.w:g.x;
      ctx.beginPath();ctx.arc(cx2,g.y+g.h/2,cr,idx===0?-Math.PI/2:Math.PI/2,idx===0?Math.PI/2:-Math.PI/2,idx!==0);ctx.stroke();
    }
    ctx.restore();
  });
}

function drawCenter(){
  const pr=port();
  ctx.strokeStyle='rgba(200,50,50,.3)';ctx.lineWidth=2.5;
  ctx.beginPath();
  if(pr){ctx.moveTo(14,GH/2);ctx.lineTo(GW-14,GH/2)}
  else{ctx.moveTo(GW/2,14);ctx.lineTo(GW/2,GH-14)}
  ctx.stroke();

  const r=Math.min(GW,GH)*.07;
  ctx.strokeStyle='rgba(50,100,180,.2)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(GW/2,GH/2,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(50,100,180,.25)';ctx.beginPath();ctx.arc(GW/2,GH/2,4,0,Math.PI*2);ctx.fill();
}

function drawPuckD(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.1)';
  ctx.beginPath();ctx.ellipse(puck.x+2,puck.y+3,puck.r*1.1,puck.r*.5,0,0,Math.PI*2);ctx.fill();
  const pg=ctx.createRadialGradient(puck.x-puck.r*.3,puck.y-puck.r*.3,0,puck.x,puck.y,puck.r);
  pg.addColorStop(0,'#444');pg.addColorStop(1,'#111');
  ctx.fillStyle=pg;ctx.beginPath();ctx.arc(puck.x,puck.y,puck.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.12)';
  ctx.beginPath();ctx.arc(puck.x-puck.r*.2,puck.y-puck.r*.2,puck.r*.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

const imgC={};
function ldImg(s){if(!s||s.length<10)return null;if(imgC[s])return imgC[s];const i=new Image();i.src=s;imgC[s]=i;return i}

function drawPlayerD(pl,isMe){
  const r=pl.r;
  ctx.save();

  ctx.fillStyle='rgba(0,0,0,.1)';
  ctx.beginPath();ctx.ellipse(pl.x+2,pl.y+3,r*1.05,r*.4,0,0,Math.PI*2);ctx.fill();

  const src=isMe?(userData.customAvatar||userData.avatar):_enAvatar;
  const isEmoji=!src||src.length<=4;
  const isBotDraw=!isMe&&isBot;

  const gr=ctx.createRadialGradient(pl.x-r*.3,pl.y-r*.3,0,pl.x,pl.y,r);
  gr.addColorStop(0,isMe?'#5599ee':'#ee5566');gr.addColorStop(1,isMe?'#2266aa':'#aa2233');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(pl.x,pl.y,r,0,Math.PI*2);ctx.fill();

  if(isBotDraw){
    drawBotFace(pl.x,pl.y,r);
  } else if(!isEmoji&&src){
    const img=ldImg(src);
    if(img&&img.complete&&img.naturalWidth>0){
      ctx.save();ctx.beginPath();ctx.arc(pl.x,pl.y,r-3,0,Math.PI*2);ctx.clip();
      ctx.drawImage(img,pl.x-r+3,pl.y-r+3,(r-3)*2,(r-3)*2);ctx.restore();
    }
  } else if(src){
    ctx.font=`${r*.85}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(src,pl.x,pl.y+2);
  }

  ctx.strokeStyle=isMe?'#4a9eff':'#ef4444';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(pl.x,pl.y,r,0,Math.PI*2);ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.beginPath();ctx.arc(pl.x-r*.25,pl.y-r*.3,r*.35,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBotFace(x,y,r){
  const es=r*.35,ey=y-r*.12,er=r*.16,pr=r*.08;

  ctx.fillStyle='#fff';
  if(botBlink){
    ctx.strokeStyle='#333';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x-es-er,ey);ctx.lineTo(x-es+er,ey);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+es-er,ey);ctx.lineTo(x+es+er,ey);ctx.stroke();
  } else {
    ctx.beginPath();ctx.arc(x-es,ey,er,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+es,ey,er,0,Math.PI*2);ctx.fill();
    const dx=puck.x-x,dy=puck.y-y,d=Math.hypot(dx,dy)||1;
    const lx=dx/d*er*.45,ly=dy/d*er*.45;
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(x-es+lx,ey+ly,pr,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+es+lx,ey+ly,pr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.beginPath();ctx.arc(x-es+lx*.4-1,ey+ly*.4-1,pr*.35,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+es+lx*.4-1,ey+ly*.4-1,pr*.35,0,Math.PI*2);ctx.fill();
  }

  ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(x,y+r*.28,r*.15,.1*Math.PI,.9*Math.PI);ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font=`bold ${r*.22}px Inter,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('BOT',x,y+r*.55);
}

function drawPulse(){
  const t=Date.now()*.003;
  const a=.05+Math.sin(t)*.03;
  const ex=6+Math.sin(t)*3;
  ctx.strokeStyle=`rgba(74,158,255,${a})`;
  ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(myP.x,myP.y,myP.r+ex,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
}

function setAvatarEl(id,src){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML='';
  if(!src||src.length<=4){el.textContent=src||'❓';el.style.fontSize='1.2rem'}
  else{const img=document.createElement('img');img.src=src;el.appendChild(img);el.style.fontSize=''}
}

window.addEventListener('resize',()=>{if(gameRunning){resizeCanvas();resetPos()}});

init();
</script>
