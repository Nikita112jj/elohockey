<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ICE CLASH</title>
<script src="https://cdn.jsdelivr.net/unpkg/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=hi');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--b1:#0f1928;--b2:#1a2634;--b3:#223044;--b4:#2a3a50;--t1:#e8edf2;--t2:#8899aa;--t3:#556677;--ac:#4a9eff;--rd:#ef4444;--gn:#22bc5e;--gd:#f59e0b;--bd:rgba(255,255,255,.06);--r:12px}
body{background:var(--b1);font-family:'Inter',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;color:var(--t1)}
.sc{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0}
.sc.on{display:flex;flex-direction:column;align-items:center;justify-content:center}
#authSc{background:var(--b1);gap:1em}
.acard{background:var(--b2);border:1px solid var(--bd);border-radius:16px;padding:2em 1.8em;width:min(380px,90vw);display:flex;flex-direction:column;gap:.7em}
.atitle{font-size:1.3rem;font-weight:800;text-align:center;display:flex;align-items:center;justify-content:center;gap:.4em;margin-bottom:.3em}
.atabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.atab{flex:1;padding:.5em;text-align:center;font-size:.78rem;font-weight:600;cursor:pointer;background:var(--b3);color:var(--t2);transition:.15s}
.atab.on{background:var(--ac);color:#fff}
.albl{font-size:.68rem;font-weight:600;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-top:.2em}
.ainp{width:100%;padding:.6em .85em;background:var(--b3);border:1.5px solid var(--bd);border-radius:8px;color:var(--t1);font-family:inherit;font-size:.88rem;outline:none;transition:.2s}
.ainp:focus{border-color:var(--ac)}
.ainp::placeholder{color:var(--t3)}
.aerr{color:var(--rd);font-size:.73rem;font-weight:500;min-height:1em;text-align:center}
#menuSc{background:var(--b1);gap:0;position:relative}
.mbg{position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(74,158,255,.04) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(74,158,255,.03) 0%,transparent 50%)}
.mlogo{font-size:clamp(2rem,7vw,3.5rem);font-weight:900;letter-spacing:-.02em;position:relative;z-index:2;display:flex;align-items:center;gap:.3em}
.mlogo-i{width:clamp(2rem,6vw,3rem);height:clamp(2rem,6vw,3rem);background:var(--ac);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:#fff}
.mlogo span{color:var(--ac)}
.msub{color:var(--t3);font-size:clamp(.7rem,2vw,.85rem);font-weight:500;letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.5em;position:relative;z-index:2}
.mprof{position:relative;z-index:2;margin-bottom:1.5em;background:var(--b2);border:1px solid var(--bd);border-radius:16px;padding:.8em 1.2em;display:flex;align-items:center;gap:.8em;width:min(340px,85vw)}
.mav{width:44px;height:44px;border-radius:var(--r);background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;border:2px solid var(--ac)}
.mav img{width:100%;height:100%;object-fit:cover}
.minfo{flex:1}
.mname{font-weight:700;font-size:.9rem}
.melo{color:var(--gd);font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3em}
.mbtns{display:flex;flex-direction:column;gap:.7em;width:min(340px,85vw);position:relative;z-index:2}
.btn{padding:.8em 1.5em;border:none;border-radius:var(--r);font-family:inherit;font-size:.86rem;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:.5em}
.btn1{background:var(--ac);color:#fff}
.btn1:active{transform:scale(.97)}
.btn2{background:transparent;border:1.5px solid var(--bd);color:var(--t1)}
.btn2:hover{background:var(--b3);border-color:rgba(74,158,255,.3)}
.btn3{background:var(--b3);color:var(--t2);border:1px solid var(--bd)}
.btnr{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.btic{position:absolute;top:16px;width:42px;height:42px;background:var(--b3);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:.15s}
.btic:hover{background:var(--b4);color:var(--t1)}
.btic.rt{right:16px}
.btic.lt{left:16px}
#matchSc{background:var(--b1);gap:1.5em}
.mcard{background:var(--b2);border:1px solid var(--bd);border-radius:16px;padding:2.5em 2em;display:flex;flex-direction:column;align-items:center;gap:1.2em;width:min(360px,88vw)}
.mspin{width:52px;height:52px;border:3px solid var(--b3);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.mtitle{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.5em}
.mstat{color:var(--t2);font-size:.8rem;font-weight:500}
.mtimer{color:var(--t1);font-size:1.8rem;font-weight:800}
#setSc{background:var(--b1);gap:1em;padding:20px}
.shdr{display:flex;align-items:center;gap:.5em;margin-bottom:.5em}
.stitle{font-size:1.2rem;font-weight:700}
.scard{background:var(--b2);border:1px solid var(--bd);border-radius:16px;padding:1.2em;width:min(400px,90vw)}
.slbl{color:var(--t2);font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5em}
.avgs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%}
.avo{width:100%;aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:2px solid transparent;cursor:pointer;transition:.15s;background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.avo.on{border-color:var(--ac);background:rgba(74,158,255,.15)}
.avo img{width:100%;height:100%;object-fit:cover;border-radius:var(--r)}
.avup{width:100%;aspect-ratio:1;border-radius:var(--r);border:1.5px dashed var(--t3);cursor:pointer;background:transparent;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;color:var(--t3);transition:.15s}
.avup:hover{border-color:var(--ac);color:var(--ac);background:rgba(74,158,255,.15)}
.avup span{font-size:.48rem;font-weight:600}
#avFile{display:none}
#vsSc{background:var(--b1);gap:0}
.vsw{display:flex;flex-direction:column;align-items:center;gap:2em}
.vsc{display:flex;align-items:center;gap:1.5em;justify-content:center}
.vsp{display:flex;flex-direction:column;align-items:center;gap:.4em;min-width:100px}
.vsav{width:68px;height:68px;border-radius:16px;background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;border:3px solid var(--ac)}
.vsav.en{border-color:var(--rd)}
.vsav img{width:100%;height:100%;object-fit:cover}
.vsn{font-weight:700;font-size:.88rem;text-align:center;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vse{color:var(--gd);font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:.3em}
.vsb{font-size:2.2rem;font-weight:900;color:var(--rd);flex-shrink:0}
.vsi{text-align:center;color:var(--t2);font-size:.78rem;font-weight:500}
.vscd{font-size:2rem;font-weight:900;color:var(--ac);margin-top:.5em}
#gameSc{background:#000;padding:0}
canvas{display:block;touch-action:none}
.gui{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(180deg,rgba(15,25,40,.94) 0%,rgba(15,25,40,.5) 80%,transparent 100%);pointer-events:none;z-index:5}
.sbox{display:flex;align-items:center;gap:6px}
.sinf{display:flex;flex-direction:column}
.snm{font-size:.55rem;color:var(--t3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.snum{font-size:1.5rem;font-weight:900;line-height:1}
.snum.me{color:var(--ac)}
.snum.en{color:var(--rd)}
.sdot{display:flex;gap:3px;margin-top:2px}
.sd{width:7px;height:7px;border-radius:50%;background:var(--b3);border:1px solid var(--t3)}
.sd.fb{background:var(--ac);border-color:var(--ac)}
.sd.fr{background:var(--rd);border-color:var(--rd)}
.gtb{text-align:center}
.gt{font-size:1rem;font-weight:800}
.gtrg{font-size:.5rem;color:var(--gd);font-weight:600}
.gpi{font-size:.48rem;color:var(--t3);font-weight:500;margin-top:1px}
.gav{width:30px;height:30px;border-radius:8px;overflow:hidden;border:2px solid var(--ac);background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.gav.en{border-color:var(--rd)}
.gav img{width:100%;height:100%;object-fit:cover}
#govl{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
#govl.on{opacity:1}
.govt{font-size:clamp(2.5rem,9vw,5rem);font-weight:900;animation:gp .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes gp{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.govs{color:rgba(255,255,255,.6);font-size:.85rem;font-weight:500;margin-top:.3em}
#resSc{background:var(--b1);gap:1.2em}
.rcard{background:var(--b2);border:1px solid var(--bd);border-radius:16px;padding:2em;display:flex;flex-direction:column;align-items:center;gap:.5em;width:min(340px,88vw)}
.ri{font-size:3rem;margin-bottom:.2em}
.rtit{font-size:1.4rem;font-weight:800}
.rsc{font-size:2.5rem;font-weight:900}
.relo{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:.4em}
.relo.p{color:var(--gn)}.relo.n{color:var(--rd)}
.rw{color:var(--gd)}.rl{color:var(--rd)}.rd{color:var(--ac)}
.rbtns{display:flex;flex-direction:column;gap:.5em;width:min(280px,80vw);margin-top:.3em}
</style>
</head>
<body>

<div id="authSc" class="sc on">
<div class="acard">
<div class="atitle"><i data-lucide="shield" style="width:22px;height:22px;color:var(--ac)"></i> ICE CLASH</div>
<div class="atabs"><div class="atab on" id="tLogin" onclick="stab('login')">Вход</div><div class="atab" id="tReg" onclick="stab('reg')">Регистрация</div></div>
<div class="albl">Никнейм</div>
<input class="ainp" id="aNick" placeholder="Введи ник..." maxlength="16" autocomplete="off">
<div class="albl">Пароль</div>
<input type="password" class="ainp" id="aPass" placeholder="Введи пароль..." maxlength="32">
<div class="aerr" id="aErr"></div>
<div class="btn btn1" onclick="doAuth()"><i data-lucide="log-in" style="width:16px;height:16px"></i> <span id="aBtnT">Войти</span></div>
</div>
</div>

<div id="menuSc" class="sc">
<div class="mbg"></div>
<div class="btic rt" onclick="openSet()"><i data-lucide="settings" style="width:20px;height:20px"></i></div>
<div class="btic lt" onclick="doLogout()"><i data-lucide="log-out" style="width:20px;height:20px"></i></div>
<div class="mlogo"><div class="mlogo-i"><i data-lucide="swords" style="width:24px;height:24px"></i></div> ICE <span>CLASH</span></div>
<div class="msub">Online Hockey</div>
<div class="mprof">
<div class="mav" id="mAv"></div>
<div class="minfo"><div class="mname" id="mNm">Player</div><div class="melo"><i data-lucide="trophy" style="width:14px;height:14px"></i> <span id="mElo">1000</span> ELO</div></div>
</div>
<div class="mbtns">
<div class="btn btn1" onclick="startMM()"><i data-lucide="globe" style="width:18px;height:18px"></i> Найти игру</div>
<div class="btn btn2" onclick="startBot()"><i data-lucide="bot" style="width:18px;height:18px"></i> Играть с бот</div>
</div>
</div>

<div id="matchSc" class="sc">
<div class="mcard">
<div class="mspin"></div>
<div class="mtitle"><i data-lucide="search" style="width:18px;height:18px"></i> Поиск</div>
<div class="mstat" id="mStat">Ожидание...</div>
<div class="mtimer" id="mTime">0:00</div>
</div>
<div class="btn btnr" style="width:min(280px,75vw);margin-top:1.2em" onclick="cancelMM()"><i data-lucide="x" style="width:16px;height:16px"></i> Отмена</div>
</div>

<div id="setSc" class="sc">
<div class="shdr"><i data-lucide="settings" style="width:22px;height:22px;color:var(--ac)"></i><div class="stitle">Настройки</div></div>
<div class="scard"><div class="slbl">Аватарка</div><div class="avgs" id="avGrid"></div></div>
<div style="display:flex;gap:8px;margin-top:.8em;width:min(400px,90vw)">
<div class="btn btn1" style="flex:1" onclick="saveSet()"><i data-lucide="check" style="width:16px;height:16px"></i> Сохранить</div>
<div class="btn btn3" style="flex:1" onclick="goMenu()"><i data-lucide="arrow-left" style="width:16px;height:16px"></i> Назад</div>
</div>
<input type="file" id="avFile" accept="image/*" onchange="avUpload(event)">
</div>

<div id="vsSc" class="sc">
<div class="vsw">
<div class="vsc">
<div class="vsp"><div class="vsav" id="vsMA"></div><div class="vsn" id="vsMN">Ты</div><div class="vse"><i data-lucide="trophy" style="width:13px;height:13px"></i> <span id="vsME">1000</span></div></div>
<div class="vsb">VS</div>
<div class="vsp"><div class="vsav en" id="vsEA"></div><div class="vsn" id="vsEN">Bot</div><div class="vse"><i data-lucide="trophy" style="width:13px;height:13px"></i> <span id="vsEE">800</span></div></div>
</div>
<div class="vsi">До 3 голов</div>
<div class="vscd" id="vsCD">3</div>
</div>
</div>

<div id="gameSc" class="sc">
<canvas id="cv"></canvas>
<div class="gui">
<div class="sbox"><div class="gav" id="gMA"></div><div class="sinf"><div class="snm" id="gMN">Ты</div><div class="snum me" id="gMS">0</div><div class="sdot" id="gMD"></div></div></div>
<div class="gtb"><div class="gtrg">До 3 голов</div><div class="gt" id="gTm">5:00</div><div class="gpi" id="gPi"></div></div>
<div class="sbox" style="flex-direction:row-reverse"><div class="gav en" id="gEA"></div><div class="sinf" style="text-align:right"><div class="snm" id="gEN">Bot</div><div class="snum en" id="gES">0</div><div class="sdot" id="gED" style="justify-content:flex-end"></div></div></div>
</div>
<div id="govl"><div class="govt" id="goT">ГОЛ!</div><div class="govs" id="goS"></div></div>
</div>

<div id="resSc" class="sc">
<div class="rcard"><div class="ri" id="rI"></div><div class="rtit" id="rT">Победа!</div><div class="rsc" id="rS"></div><div class="relo" id="rE"></div></div>
<div class="rbtns">
<div class="btn btn1" onclick="goMenu()"><i data-lucide="home" style="width:16px;height:16px"></i> Меню</div>
<div class="btn btn2" onclick="startBot()"><i data-lucide="bot" style="width:16px;height:16px"></i> Ещё с ботом</div>
</div>
</div>

<script>
const SU='https://xzggapbhxescghsgrfsdi.supabase.co',SK='sb_publishable_5JGWXQFr78evpyAixvfx6G6M_v0nPdXSAW'
let sb
try{sb=supabase.createClient(SU,SK)}catch(e){sb=null}

const MG=3,GT=300,AVS=['🏒','⛂','🏆','🥅','🎯','🦁','🐯','🦊','🐺','🐧','🦅','🔮','❄️','💎','⚡']
let U={id:null,nm:'',av:'🏒',cav:null,elo:1000},aMode='login'
let cv,cx,W,H,go=false,isBot=false,myId='',opId='',isHost=false
let ch=null,gCh=null,mmI=null,mmTI=null,mmS=0,mmOn=false
let gtI=null,gS=GT,ping=0,piI=null
let me={x:0,y:0,r:0},op={x:0,y:0,r:0}
let pk={x:0,y:0,r:0,vx:0,vy:0}
let sM=0,sO=0,drag=false,dPid=null,dOx=0,dOy=0
let lST=0,aF=null,gCD=false
let bD=.5,bE=800,bST=150,bBl=0,bBlT=200
let oElo=1000,eld=0,_ea='🏒',_en='Bot'
let sAv=null,sCav=null

function P(){return H>W*1.1}
function lci(){setTimeout(()=>{try{lucide.createInstance&&lucide.createInstance();lucide.createIcons()}catch(e){}},30)}

// Auth
function stab(m){aMode=m;document.getElementById('tLogin').className='atab'+(m==='login'?' on':'');document.getElementById('tReg').className='atab'+(m==='reg'?' on':'');document.getElementById('aBtnT').textContent=m==='login'?'Войти':'Создистрация';document.getElementById('aErr').textContent=''}
async function hashPw(p){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}

async function doAuth(){
 const n=document.getElementById('aNick').value.trim(),p=document.getElementById('aPass').value,e=document.getElementById('aErr')
 e.textContent=''
 if(!n||n.length<2){e.textContent='Минимум 2 символа';return}
 if(!p||p.length<3){e.textContent='Пароль от 3 символов';return}
 const h=await hashPw(p),nl=n.toLowerCase()
 if(!sb){e.textContent='Нет подключения к серверу';return}
 if(aMode==='reg'){
  const{data:ex}=await sb.from('users').select('id').eq('nick_lower',nl).limit(1)
  if(ex&&ex.length>0){e.textContent='Ник занят';return}
  const{data:r,error:er}=await sb.from('users').insert({name:n,nick_lower:nl,pw_hash:h,avatar:'🏒',elo:1000}).select().single()
  if(er){e.textContent='Ошибка: '+er.message;return}
  U={id:r.id,nm:r.name,av:r.avatar||'🏒',cav:null,elo:r.elo||1000}
  saveL();goIn()
 }else{
  const{data:r,error:er}=await sb.from('users').select('*').eq('nick_lower',nl).eq('pw_hash',h).limit(1).single()
  if(er||!r){e.textContent='Неверный ник или пароль';return}
  U={id:r.id,nm:r.name,av:r.avatar||'🏒',cav:r.custom_avatar||null,elo:r.elo||1000}
  saveL();goIn()
 }
}

function doLogout(){localStorage.removeItem('iu');U={id:null,nm:'',av:'🏒',cav:null,elo:1000};show('authSc');lci()}
function saveL(){localStorage.setItem('iu',JSON.stringify(U))}
async function saveP(){saveL();if(!U.id||!sb)return;await sb.from('users').update({avatar:U.av,custom_avatar:U.cav,elo:U.elo}).eq('id',U.id)}
function goIn(){updMenu();show('menuSc');lci()}
function updMenu(){document.getElementById('mNm').textContent=U.nm;document.getElementById('mElo').textContent=U.elo;setAv('mAv',U.cav||U.av)}

async function autoLogin(){
 const s=localStorage.getItem('iu')
 if(!s){show('authSc');lci();return}
 try{U=JSON.parse(s)}catch(e){show('authSc');lci();return}
 if(!U.id){show('authSc');lci();return}
 if(sb){const{data:r}=await sb.from('users').select('*').eq('id',U.id).single()
 if(r){U.nm=r.name;U.av=r.avatar||'🏒';U.cav=r.custom_avatar||null;U.elo=r.elo||1000;saveL()}}
 goIn()
}

function calcElo(a,b,r){return Math.round(40*(r-1/(1+Math.pow(10,(b-a)/400))))}

function show(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function goMenu(){cleanAll();updMenu();show('menuSc');lci()}

// Settings
function openSet(){sAv=U.av;sCav=U.cav;buildAv();show('setSc');lci()}
function buildAv(){
 const g=document.getElementById('avGrid');g.innerHTML=''
 AVS.forEach(a=>{const d=document.createElement('div');d.className='avo'+(U.av===a&&!sCav?' on':'');d.textContent=a;d.onclick=()=>{document.querySelectorAll('.avo').forEach(e=>e.classList.remove('on'));d.classList.add('on');sAv=a;sCav=null};g.appendChild(d)})
 const u=document.createElement('div');u.className='avup';u.innerHTML='<i data-lucide="upload" style="width:18px;height:18px"></i><span>Загрузить</span>';u.onclick=()=>document.getElementById('avFile').click();g.appendChild(u)
 if(sCav){const p=document.createElement('div');p.className='avo on';const im=document.createElement('img');im.src=sCav;p.appendChild(im);p.onclick=()=>{document.querySelectorAll('.avo').forEach(e=>e.classList.remove('on'));p.classList.add('on');sAv=null};g.insertBefore(p,u)}
 setTimeout(()=>lci(),50)
}
function avUpload(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{sCav=ev.target.result;sAv=null;buildAv()};r.readAsDataURL(f)}
async function saveSet(){U.av=sAv||'🏒';U.cav=sCav;await saveP();goMenu()}

// Clean
function cleanAll(){

 if(aF){cancelAnimationFrame(aF);aF=null}
 if(ch){try{ch.unsubscribe()}catch(e){}}

// Matchmaking
async function startMM(){
 cleanAll();if(!sb)return
 myId='p_'+Math.random().toString(36).substr(2,9)+'_'+Date.now()
 mmOn=true;mmS=0;show('matchSc');document.getElementById('mStat').textContent='Ожидание...';document.getElementById('mTime').textContent='0:00';lci()
 mmTI=setInterval(()=>{mmS++;document.getElementById('mTime').textContent=`${Math.floor(mmS/60)}:${(mmS%60).toString().padStart(2,'0')}`},1000)

 ch=sb.channel('mm_v6',{config:{broadcast:{self:false}}})
 ch.on('broadcast',{event:'seek'},msg=>{
  if(!mmOn||opId)return
  const d=msg.data||msg.payload
  if(d.id!==myId){opId=d.id;isHost=true;mmOn=false;initOnline(d)}
 })
 await ch.subscribe()

 mmI=setInterval(()=>{if(!mmOn)return;ch.send({type:'broadcast',event:'seek',payload:{id:myId,nm:U.nm,av:U.cav||U.av,elo:U.elo,ts:Date.now()}})},1100)

 gCh=sb.channel('p_'+myId,{config:{broadcast:{self:false}}})
 gCh.on('broadcast',{event:'inv'},msg=>{
  if(!mmOn||opId)return
  const d=msg.data||msg.payload
  opId=d.hid;isHost=false;mmOn=false;joinOnline(d)
 })
 await gCh.subscribe()

 setTimeout(()=>{if(mmOn&&ch)ch.send({type:'broadcast',event:'seek',payload:{id:myId,nm:U.nm,av:U.cav||U.av,elo:U.elo,ts:Date.now()}})},300)
}

async function initOnline(d){
 clearInterval(mmI);clearInterval(mmTI);mmI=mmTI=null
 if(ch){try{ch.unsubscribe()}catch(e){}}ch=null
 if(gCh){try{gCh.unsubscribe()}catch(e){}}gCh=null
 _en=d.nm||'???';_ea=d.av||'🏒';oElo=d.elo||1000
 const rm='rm_'+myId+'_'+opId
 const iv=sb.channel('p_'+opId);await iv.subscribe()
 for(let i=0;i<4;i++)setTimeout(()=>iv.send({type:'broadcast',event:'inv',payload:{hid:myId,nm:U.nm,av:U.cav||U.av,elo:U.elo,rm}}),i*200)
 setTimeout(()=>{try{iv.unsubscribe()}catch(e){}},3000)
 showVS(_en,_ea,oElo,()=>setupRoom(rm))
}

async function joinOnline(d){
 clearInterval(mmI);clearInterval(mmTI);mmI=mmTI=null
 if(ch){try{ch.unsubscribe()}catch(e){}}ch=null
 if(gCh){try{gCh.unsubscribe()}catch(e){}}gCh=null
 _en=d.nm||'???';_ea=d.av||'🏒';oElo=d.elo||1000
 showVS(_en,_ea,oElo,()=>setupRoom(d.rm))
}

async function setupRoom(rm){
 ch=sb.channel(rm,{config:{broadcast:{self:false}}})

 // Receive opponent position
 // Each player sends their absolute position as fraction of screen
 // The opponent is always on the OTHER side
 // If I'm host (bottom/right), opponent is top/left
 // Opponent sends their position relative to their own screen
 // On their screen they are also on their own side
 // So opponent's position needs to be mirrored to appear on the opposite side of my screen
 ch.on('broadcast',{event:'s'},msg=>{
  const d=msg.data||msg.payload
  if(d.id===myId)return
  // Mirror: opponent sees themselves on their side, I need to show them on the opposite side
  op.x=(1-d.x)*W
  op.y=(1-d.y)*H
 })

 ch.on('broadcast',{event:'p'},msg=>{
  if(isHost)return
  const d=msg.data||msg.payload
  // Puck from host perspective, mirror for guest
  pk.x=(1-d.x)*W
  pk.y=(1-d.y)*H
  pk.vx=-d.vx*W
  pk.vy=-d.vy*H
 })

 ch.on('broadcast',{event:'g'},msg=>{
  const d=msg.data||msg.payload
  // sender says 'me' = they scored, meaning I got scored on
  if(d.w==='me'){sO++;document.getElementById('gES').textContent=sO;showGoal('ГОЛ!','#ef4444',_en+' забил')}
  else{sM++;document.getElementById('gMS').textContent=sM;showGoal('ГОЛ!','#4a9eff','Ты забил!')}
  updDots()
  if(sM>=MG||sO>=MG)setTimeout(()=>endGame(),1600)
 })

 ch.on('broadcast',{event:'r'},()=>resetPos())
 ch.on('broadcast',{event:'po'},msg=>{const d=msg.data||msg.payload;if(d.t===myId)ping=Date.now()-d.s})
 ch.on('broadcast',{event:'pi'},msg=>{const d=msg.data||msg.payload;if(ch)ch.send({type:'broadcast',event:'po',payload:{t:d.f,s:d.s}})})

 await ch.subscribe()
 setGUI();beginGame(false)
 piI=setInterval(()=>{if(ch&&go)ch.send({type:'broadcast',event:'pi',payload:{f:myId,t:opId,s:Date.now()}})},2500)
}

// Bot
function startBot(){
 cleanAll();isBot=true;isHost=true;myId='me';opId='bot'
 bD=.2+Math.random()*.4;bE=Math.round(400+bD*600)
 bST=180;bBl=0;bBlT=200
 const dn=bD<.3?'Лёгкий':bD<.45?'Средний':'Сложный'
 _en='Бот ('+dn+')';_ea='🏒'
 showVS(_en,'🏒',bE,()=>{setGUI();document.getElementById('gPi').textContent='';beginGame(true)})
}

function setGUI(){document.getElementById('gMN').textContent=U.nm;document.getElementById('gEN').textContent=_en;setAv('gMA',U.cav||U.av);setAv('gEA',_ea)}

function beginGame(bot){
 isBot=bot;sM=0;sO=0;gS=GT;eld=0
 document.getElementById('gMS').textContent='0';document.getElementById('gES').textContent='0'
 updDots();show('gameSc');resizeCv();resetPos();go=true
 clearInterval(gtI);gtI=setInterval(tick,1000)
 setupCtrl();if(aF)cancelAnimationFrame(aF);lci();loop()
}

function updDots(){
 ['gMD','gED'].forEach((id,i)=>{
  const el=document.getElementById(id);el.innerHTML=''
  const s=i===0?sM:sO,c=i===0?'fb':'fr'
  for(let j=0;j<MG;j++){const d=document.createElement('div');d.className='sd'+(j<s?' '+c:'');el.appendChild(d)}
 })
}

function resizeCv(){
 const s=document.getElementById('gameSc')
 W=s.clientWidth;H=s.clientHeight;cv.width=W;cv.height=H
 const m=Math.min(W,H)
 me.r=m*.05;op.r=me.r;pk.r=m*.04
}

function GW_(){return Math.min(W,H)*.28}
function GD_(){return Math.min(W,H)*.055}

function getG(){
 const w=GW_(),d=GD_()
 if(P())return{t:{x:W/2-w/2,y:0,w,h:d},b:{x:W/2-w/2,y:H-d,w,h:d}}
 return{t:{x:0,y:H/2-w/2,w:d,h:w},b:{x:W-d,y:H/2-w/2,w:d,h:w}}
}

// My goal = the one I defend
// Host defends bottom (portrait) or right (landscape)
function myGoal(){return isHost?getG().b:getG().t}
function opGoal(){return isHost?getG().t:getG().b}

function resetPos(){
 const cx=W/2,cy=H/2
 pk.x=cx;pk.y=cy;pk.vx=0;pk.vy=0
 if(P()){
  if(isHost){me.x=cx;me.y=H*.75;op.x=cx;op.y=H*.25}
  else{me.x=cx;me.y=H*.25;op.x=cx;op.y=H*.75}
 }else{
  if(isHost){me.x=W*.75;me.y=cy;op.x=W*.25;op.y=cy}
  else{me.x=W*.25;me.y=cy;op.x=W*.75;op.y=cy}
 }
 gCD=false
}

function tick(){
 if(!go)return;gS--
 document.getElementById('gTm').textContent=`${Math.floor(gS/60)}:${(gS%60).toString().padStart(2,'0')}`
 if(!isBot&&ping>0)document.getElementById('gPi').textContent='📡 '+ping+'ms'
 if(gS<=0)endGame()
}

async function endGame(){
 go=false;[gtI,piI].forEach(i=>{if(i)clearInterval(i)});gtI=piI=null
 if(aF){cancelAnimationFrame(aF);aF=null}
 if(ch){try{ch.unsubscribe()}catch(e){}}ch=null
 const oe=isBot?bE:oElo,r=sM>sO?1:sM<sO?0:.5
 eld=calcElo(U.elo,oe,r);if(isBot)eld=Math.round(eld*.4)
 U.elo=Math.max(0,U.elo+eld);await saveP();showRes()
}

function showRes(){

 s.textContent=sM+' : '+sO
 if(sM>sO){i.textContent='🏆';t.textContent='Победа!';t.className='rtit rw';s.className='rsc rw'}
 else if(sM<sO){i.textContent='😔';t.textContent='Проигрыш';t.className='rtit rl';s.className='rsc rl'}
 else{i.textContent='🤝';t.textContent='Ничья';t.className='rtit rd';s.className='rsc rd'}
 e.textContent=(eld>=0?'+':'')+eld+' ELO';e.className='relo '+(eld>=0?'p':'n')

}

// Controls
function setupCtrl(){
 cv.onpointerdown=cv.onpointermove=cv.onpointerup=cv.onpointercancel=null
 cv.addEventListener('pointerdown',pd,{passive:false})
 cv.addEventListener('pointermove',pm,{passive:false})
 cv.addEventListener('pointerup',pu,{passive:false})
 cv.addEventListener('pointercancel',pu,{passive:false})
}

function cxy(e){const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}

function pd(e){
 e.preventDefault();const p=cxy(e)
 if(Math.sqrt((p.x-me.x)**2+(p.y-me.y)**2)<me.r*3){
  drag=true;dPid=e.pointId||e.pointerId;dOx=p.x-me.x;dOy=p.y-me.y
  try{cv.setPointerCapture(e.pointerId)}catch(er){}
 }
}

function pm(e){
 e.preventDefault();if(!drag||!go||e.pointerId!==dPid)return
 const p=cxy(e),r=me.r;let nx=p.x-dOx,ny=p.y-dOy
 if(P()){
  nx=Math.max(r,Math.min(W-r,nx))
  if(isHost)ny=Math.max(H/2+r,Math.min(H-r,ny));else ny=Math.max(r,Math.min(H/2-r,ny))
 }else{
  ny=Math.max(r,Math.min(H-r,ny))
  if(isHost)nx=Math.max(W/2+r,Math.min(W-r,nx));else nx=Math.max(r,Math.min(W/2-r,nx))
 }
 me.x=nx;me.y=ny;hitPk(me,true)
}

function pu(e){if(e.pointerId===dPid){drag=false;dPid=null;try{cv.releasePointerCapture(e.pointerId)}catch(er){}}}

// Physics
function hitPk(pl,isMe){
 const dx=pk.x-pl.x,dy=pk.y-pl.y,d=Math.sqrt(dx*dx+dy*dy),m=pl.r+pk.r
 if(d<m&&d>.01){
  const nx=dx/d,ny=dy/d
  pk.x=pl.x+nx*m;pk.y=pl.y+ny*m
  const spd=Math.min(W,H)*.015
  pk.vx=nx*spd;pk.vy=ny*spd
  if(!isBot&&isMe)sendPk()
 }
}

function updPk(){
 if(!go)return
 pk.x+=pk.vx;pk.y+=pk.vy;pk.vx*=.993;pk.vy*=.993
 if(Math.abs(pk.vx)<.01)pk.vx=0;if(Math.abs(pk.vy)<.01)pk.vy=0

 const g=getG(),p=P(),bw=14

 // Check goals
 if(!gCD){
  if(p){
   if(pk.y-pk.r<=g.t.y+g.t.h&&pk.y<g.t.h+pk.r&&pk.x>g.t.x+pk.r&&pk.x<g.t.x+g.t.w-pk.r){
    onGoal(isHost);return}
   if(pk.y+pk.r>=g.b.y&&pk.x>g.b.x+pk.r&&pk.x<g.b.x+g.b.w-pk.r){
    onGoal(!isHost);return}
  }else{
   if(pk.x-pk.r<=g.t.x+g.t.w&&pk.x<g.t.w+pk.r&&pk.y>g.t.y+pk.r&&pk.y<g.t.y+g.t.h-pk.r){
    onGoal(isHost);return}
   if(pk.x+pk.r>=g.b.x&&pk.y>g.b.y+pk.r&&pk.y<g.b.y+g.b.h-pk.r){
    onGoal(!isHost);return}
  }
 }

 // Walls
 if(p){
  if(pk.x-pk.r<bw){pk.x=bw+pk.r;pk.vx*=-.8}
  if(pk.x+pk.r>W-bw){pk.x=W-bw-pk.r;pk.vx*=-.8}
  if(pk.y-pk.r<bw&&(pk.x<g.t.x||pk.x>g.t.x+g.t.w)){pk.y=bw+pk.r;pk.vy*=-.8}
  if(pk.y+pk.r>H-bw&&(pk.x<g.b.x||pk.x>g.b.x+g.b.w)){pk.y=H-bw-pk.r;pk.vy*=-.8}
  pBounce(g.t.x,g.t.y+g.t.h);pBounce(g.t.x+g.t.w,g.t.y+g.t.h)
  pBounce(g.b.x,g.b.y);pBounce(g.b.x+g.b.w,g.b.y)
 }else{
  if(pk.y-pk.r<bw){pk.y=bw+pk.r;pk.vy*=-.8}
  if(pk.y+pk.r>H-bw){pk.y=H-bw-pk.r;pk.vy*=-.8}
  if(pk.x-pk.r<bw&&(pk.y<g.t.y||pk.y>g.t.y+g.t.h)){pk.x=bw+pk.r;pk.vx*=-.8}
  if(pk.x+pk.r>W-bw&&(pk.y<g.b.y||pk.y>g.b.y+g.b.h)){pk.x=W-bw-pk.r;pk.vx*=-.8}
  pBounce(g.t.x+g.t.w,g.t.y);pBounce(g.t.x+g.t.w,g.t.y+g.t.h)
  pBounce(g.b.x,g.b.y);pBounce(g.b.x,g.b.y+g.b.h)
 }
 hitPk(op,false)
}

function pBounce(px,py){
 const dx=pk.x-px,dy=pk.y-py,d=Math.sqrt(dx*dx+dy*dy),r=pk.r+4
 if(d<r&&d>0){pk.x=px+dx/d*r;pk.y=py+dy/d*r;const dot=pk.vx*dx/d+pk.vy*dy/d;pk.vx-=1.6*dot*dx/d;pk.vy-=1.6*dot*dy/d}
}

function onGoal(meScored){
 gCD=true
 if(meScored){sM++;document.getElementById('gMS').textContent=sM;showGoal('ГОЛ!','#4a9eff','Ты забил!');if(!isBot&&ch)ch.send({type:'broadcast',event:'g',payload:{w:'me'}})}
 else{sO++;document.getElementById('gES').textContent=sO;showGoal('ГОЛ!','#ef4444',_en+' забил');if(!isBot&&ch)ch.send({type:'broadcast',event:'g',payload:{w:'me'}})}
 updDots()
 setTimeout(()=>{if(sM>=MG||sO>=MG){endGame();return}resetPos();if(!isBot&&ch)ch.send({type:'broadcast',event:'r'})},1600)
}

function showGoal(t,c,s){
 const o=document.getElementById('govl'),gt=document.getElementById('goT'),gs=document.getElementById('goS')
 gt.textContent=t;gt.style.color=c;gs.textContent=s
 o.style.background='radial-gradient(ellipse at center,'+c+'33 0%,transparent 70%)'
 o.classList.add('on');setTimeout(()=>o.classList.remove('on'),1400)
}

// Bot
function updBot(){
 if(!isBot||!go)return
 const sp=Math.min(W,H)*.0025*bD
 bBlT--;if(bBlT<=0){bBl=1;bBlT=140+Math.random()*260;setTimeout(()=>{bBl=0},150)}
 bST--

 const g=getG(),p=P()
 // Bot defends top/left (since host=true, bot is opponent on top/left)
 const bg=g.t,bcx=bg.x+bg.w/2,bcy=bg.y+bg.h/2
 const pD=Math.sqrt((pk.x-op.x)**2+(pk.y-op.y)**2)
 const rD=Math.min(W,H)*(.15+bD*.1)
 const coming=p?(pk.vy<-.3):(pk.vx<-.3)
 const pG=Math.sqrt((pk.x-bcx)**2+(pk.y-bcy)**2)

 let tx,ty
 if(pD<rD||(coming&&pG<Math.min(W,H)*.4)){
  tx=pk.x+pk.vx*bD*3;ty=pk.y+pk.vy*bD*3
 }else{
  if(p){tx=bcx+(pk.x-bcx)*.15;ty=H*.2}
  else{tx=W*.2;ty=bcy+(pk.y-bcy)*.15}
 }

 const dx=tx-op.x,dy=ty-op.y,d=Math.sqrt(dx*dx+dy*dy)||1
 const ms=Math.min(sp*1.3,d*.05)
 let nx=op.x+dx/d*ms,ny=op.y+dy/d*ms,r=op.r
 if(p){nx=Math.max(r,Math.min(W-r,nx));ny=Math.max(r,Math.min(H/2-r,ny))}
 else{ny=Math.max(r,Math.min(H-r,ny));nx=Math.max(r,Math.min(W/2-r,nx))}
 op.x=nx;op.y=ny;hitPk(op,false)

 if(bST<=0&&pD<Math.min(W,H)*.15){
  const tg=g.b,gx=tg.x+tg.w/2+(Math.random()-.5)*tg.w*.4,gy=tg.y+tg.h/2
  const sdx=gx-pk.x,sdy=gy-pk.y,sd=Math.sqrt(sdx*sdx+sdy*sdy)||1
  const ss=Math.min(W,H)*.007*(.4+bD*.5)
  pk.vx=sdx/sd*ss;pk.vy=sdy/sd*ss
  bST=Math.round(120+Math.random()*100/Math.max(bD,.2))
 }
}

// Sync
function sendS(){
 if(!ch||isBot)return;const n=Date.now();if(n-lST<40)return;lST=n
 ch.send({type:'broadcast',event:'s',payload:{x:me.x/W,y:me.y/H,id:myId}})
}

function sendPk(){
 if(!ch||isBot||!isHost)return
 ch.send({type:'broadcast',event:'p',payload:{x:pk.x/W,y:pk.y/H,vx:pk.vx/W,vy:pk.vy/H}})
}

let lPkS=0

// Loop
function loop(){
 if(!go)return
 update();draw();sendS()
 if(isHost&&!isBot){const n=Date.now();if(n-lPkS>80){sendPk();lPkS=n}}
 aF=requestAnimationFrame(loop)
}

function update(){
 if(isBot)updBot()
 if(isHost||isBot)updPk()
 else{pk.x+=pk.vx;pk.y+=pk.vy;pk.vx*=.993;pk.vy*=.993}
 hitPk(me,true)
}

// Draw
function draw(){
 cx.clearRect(0,0,W,H)
 drawIce();drawGoals();drawCenter();drawPuck()
 drawPl(op,false);drawPl(me,true)
 if(!drag)drawPulse()
}

function drawIce(){
 const g=cx.createLinearGradient(0,0,W,H)
 g.addColorStop(0,'#c8dff0');g.addColorStop(.5,'#daeaf2');g.addColorStop(1,'#c4dbec')
 cx.fillStyle=g;cx.fillRect(0,0,W,H)
 cx.strokeStyle='rgba(180,210,235,.3)';cx.lineWidth=.5
 for(let i=0;i<Math.max(W,H);i+=28){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,H);cx.stroke();cx.beginPath();cx.moveTo(0,i);cx.lineTo(W,i);cx.stroke()}
 const bw=14
 cx.fillStyle='#3a5a75';cx.fillRect(0,0,W,bw);cx.fillRect(0,H-bw,W,bw);cx.fillRect(0,0,bw,H);cx.fillRect(W-bw,0,bw,H)
 cx.strokeStyle='#5580a0';cx.lineWidth=2;cx.strokeRect(bw,bw,W-2*bw,H-2*bw)
 const r=Math.min(W,H)*.08;cx.strokeStyle='rgba(180,70,70,.18)';cx.lineWidth=1.5
 ;[[.25,.25],[.75,.25],[.25,.75],[.75,.75]].forEach(([fx,fy])=>{
  cx.beginPath();cx.arc(W*fx,H*fy,r,0,Math.PI*2);cx.stroke()
  cx.fillStyle='rgba(180,70,70,.2)';cx.beginPath();cx.arc(W*fx,H*fy,3,0,Math.PI*2);cx.fill()
 })
}

function drawGoals(){
 const g=getG(),p=P()
 ;[g.t,g.b].forEach((gl,i)=>{
  cx.save()
  cx.fillStyle='rgba(255,255,255,.4)';cx.fillRect(gl.x,gl.y,gl.w,gl.h)
  cx.strokeStyle='rgba(100,100,100,.2)';cx.lineWidth=.7
  for(let x=gl.x;x<gl.x+gl.w;x+=7){cx.beginPath();cx.moveTo(x,gl.y);cx.lineTo(x,gl.y+gl.h);cx.stroke()}
  for(let y=gl.y;y<gl.y+gl.h;y+=7){cx.beginPath();cx.moveTo(gl.x,y);cx.lineTo(gl.x+gl.w,y);cx.stroke()}
  cx.strokeStyle='#cc3344';cx.lineWidth=4;cx.lineCap='round'
  if(p){
   const iy=i===0?gl.y+gl.h:gl.y
   cx.beginPath();cx.moveTo(gl.x,iy);cx.lineTo(gl.x+gl.w,iy);cx.stroke()
   cx.beginPath();cx.moveTo(gl.x,iy);cx.lineTo(gl.x,i===0?gl.y:gl.y+gl.h);cx.stroke()
   cx.beginPath();cx.moveTo(gl.x+gl.w,iy);cx.lineTo(gl.x+gl.w,i===0?gl.y:gl.y+gl.h);cx.stroke()
   cx.fillStyle='#cc3344';cx.beginPath();cx.arc(gl.x,iy,4,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(gl.x+gl.w,iy,4,0,Math.PI*2);cx.fill()
  }else{
   const ix=i===0?gl.x+gl.w:gl.x
   cx.beginPath();cx.moveTo(ix,gl.y);cx.lineTo(ix,gl.y+gl.h);cx.stroke()
   cx.beginPath();cx.moveTo(ix,gl.y);cx.lineTo(i===0?gl.x:gl.x+gl.w,gl.y);cx.stroke()
   cx.beginPath();cx.moveTo(ix,gl.y+gl.h);cx.lineTo(i===0?gl.x:gl.x+gl.w,gl.y+gl.h);cx.stroke()
   cx.fillStyle='#cc3344';cx.beginPath();cx.arc(ix,gl.y,4,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(ix,gl.y+gl.h,4,0,Math.PI*2);cx.fill()
  }
  cx.strokeStyle='rgba(60,120,200,.2)';cx.lineWidth=1.5
  const cr=Math.min(gl.w,gl.h)*.6
  if(p){const cy=i===0?gl.y+gl.h:gl.y;cx.beginPath();cx.arc(gl.x+gl.w/2,cy,cr,i===0?0:Math.PI,i===0?Math.PI:0);cx.stroke()}
  else{const cx2=i===0?gl.x+gl.w:gl.x;cx.beginPath();cx.arc(cx2,gl.y+gl.h/2,cr,i===0?-Math.PI/2:Math.PI/2,i===0?Math.PI/2:-Math.PI/2,i!==0);cx.stroke()}
  cx.restore()
 })
}

function drawCenter(){
 const p=P();cx.strokeStyle='rgba(200,50,50,.3)';cx.lineWidth=2.5;cx.beginPath()
 if(p){cx.moveTo(14,H/2);cx.lineTo(W-14,H/2)}else{cx.moveTo(W/2,14);cx.lineTo(W/2,H-14)}
 cx.stroke()
 const r=Math.min(W,H)*.07;cx.strokeStyle='rgba(50,100,180,.2)';cx.lineWidth=1.5
 cx.beginPath();cx.arc(W/2,H/2,r,0,Math.PI*2);cx.stroke()
 cx.fillStyle='rgba(50,100,180,.25)';cx.beginPath();cx.arc(W/2,H/2,4,0,Math.PI*2);cx.fill()
}

function drawPuck(){
 cx.save()
 cx.fillStyle='rgba(0,0,0,.12)';cx.beginPath();cx.ellipse(pk.x+2,pk.y+3,pk.r*1.1,pk.r*.5,0,0,Math.PI*2);cx.fill()
 const g=cx.createRadialGradient(pk.x-pk.r*.3,pk.y-pk.r*.3,0,pk.x,pk.y,pk.r)
 g.addColorStop(0,'#555');g.addColorStop(1,'#111')
 cx.fillStyle=g;cx.beginPath();cx.arc(pk.x,pk.y,pk.r,0,Math.PI*2);cx.fill()
 cx.fillStyle='rgba(255,255,255,.15)';cx.beginPath();cx.arc(pk.x-pk.r*.2,pk.y-pk.r*.15,pk.r*.3,0,Math.PI*2);cx.fill()

const imgC={}
function ldI(s){if(!s||s.length<10)return null;if(imgC[s])return imgC[s];const i=new Image();i.src=s;imgC[s]=i;return i}

function drawPl(pl,isMe){
 const r=pl.r;cx.save()
 cx.fillStyle='rgba(0,0,0,.1)';cx.beginPath();cx.ellipse(pl.x+2,pl.y+3,r*1.05,r*.4,0,0,Math.PI*2);cx.fill()
 const src=isMe?(U.cav||U.av):_ea
 const isE=!src||src.length<=4
 const isBD=!isMe&&isBot
 const g=cx.createRadialGradient(pl.x-r*.3,pl.y-r*.3,0,pl.x,pl.y,r)
 g.addColorStop(0,isMe?'#5599ee':'#ee5566');g.addColorStop(1,isMe?'#2266aa':'#aa2233')
 cx.fillStyle=g;cx.beginPath();cx.arc(pl.x,pl.y,r,0,Math.PI*2);cx.fill()

 if(isBD) drawBF(pl.x,pl.y,r)
 else if(!isE&&src){const img=ldI(src);if(img&&img.complete&&img.naturalWidth>0){cx.save();cx.beginPath();cx.arc(pl.x,pl.y,r-3,0,Math.PI*2);cx.clip();cx.drawImage(img,pl.x-r+3,pl.y-r+3,(r-3)*2,(r-3)*2);cx.restore()}}
 else if(src){cx.font=r*.85+'px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(src,pl.x,pl.y+2)}

 cx.strokeStyle=isMe?'#4a9eff':'#ef4444';cx.lineWidth=2.5
 cx.beginPath();cx.arc(pl.x,pl.y,r,0,Math.PI*2);cx.stroke()
 cx.fillStyle='rgba(255,255,255,.08)';cx.beginPath();cx.arc(pl.x-r*.25,pl.y-r*.3,r*.35,0,Math.PI*2);cx.fill()
 cx.restore()
}

function drawBF(x,y,r){
 const es=r*.35,ey=y-r*.12,er=r*.16,pr=r*.08
 cx.fillStyle='#fff'
 if(bBl){cx.strokeStyle='#333';cx.lineWidth=2;cx.beginPath();cx.moveTo(x-es-er,ey);cx.lineTo(x-es+er,ey);cx.stroke();cx.beginPath();cx.moveTo(x+es-er,ey);cx.lineTo(x+es+er,ey);cx.stroke()}
 else{
  cx.beginPath();cx.arc(x-es,ey,er,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+es,ey,er,0,Math.PI*2);cx.fill()
  const dx=pk.x-x,dy=pk.y-y,d=Math.sqrt(dx*dx+dy*dy)||1,lx=dx/d*er*.45,ly=dy/d*er*.45
  cx.fillStyle='#222';cx.beginPath();cx.arc(x-es+lx,ey+ly,pr,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+es+lx,ey+ly,pr,0,Math.PI*2);cx.fill()
  cx.fillStyle='rgba(255,255,255,.6)';cx.beginPath();cx.arc(x-es+lx*.4-1,ey+ly*.4-1,pr*.35,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+es+lx*.4-1,ey+ly*.4-1,pr*.35,0,Math.PI*2);cx.fill()
 }
 cx.strokeStyle='#444';cx.lineWidth=1.5;cx.lineCap='round';cx.beginPath();cx.arc(x,y+r*.28,r*.15,.1*Math.PI,.9*Math.PI);cx.stroke()
 cx.fillStyle='rgba(255,255,255,.8)';cx.font='bold '+r*.22+'px Inter,sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('BOT',x,y+r*.55)
}

function drawPulse(){
 const t=Date.now()*.003,a=.05+Math.sin(t)*.03,e=6+Math.sin(t)*3
 cx.strokeStyle='rgba(74,158,255,'+a+')';cx.lineWidth=1.5;cx.setLineDash([4,4])
 cx.beginPath();cx.arc(me.x,me.y,me.r+e,0,Math.PI*2);cx.stroke();cx.setLineDash([])
}
